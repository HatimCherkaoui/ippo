<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ippo — Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        body {
            background: #f0f4f8;
        }

        .login-card {
            max-width: 420px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card w-100 mx-auto p-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-heart-pulse-fill text-primary" style="font-size:2.5rem;"></i>
                    <h3 class="mt-2 fw-bold">Ippo Clinic</h3>
                    <p class="text-muted small">Appointment Management System</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger py-2 small">
                    Invalid email or password.
                </div>
                <div th:if="${param.logout}" class="alert alert-success py-2 small">
                    You have been logged out.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email address</label>
                        <input type="email" name="username" class="form-control" placeholder="you@example.com" required
                            autofocus />
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                    </button>
                </form>

                <hr class="my-4" />
                <p class="text-muted small text-center mb-1"><strong>Demo accounts</strong></p>
                <table class="table table-sm table-borderless small text-center mb-0">
                    <tr>
                        <td><span class="badge bg-success">Doctor</span></td>
                        <td>doctor@ippo.com / password</td>
                    </tr>
                    <tr>
                        <td><span class="badge bg-info text-dark">Assistant</span></td>
                        <td>assistant@ippo.com / password</td>
                    </tr>
                    <tr>
                        <td><span class="badge bg-secondary">Patient</span></td>
                        <td>patient@ippo.com / password</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
