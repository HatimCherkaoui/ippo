<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schedule — Ippo Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        .sidebar {
            min-height: 100vh;
            background: #1a2035;
        }

        .sidebar .nav-link {
            color: #adb5bd;
            border-radius: 8px;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: #2d3a5e;
            color: #fff;
        }

        .sidebar .brand {
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .doctor-card {
            border-left: 4px solid #0d6efd;
            border-radius: 10px;
        }

        .badge-SCHEDULED {
            background: #e3f0ff;
            color: #1565c0;
        }

        .badge-CONFIRMED {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-CANCELLED {
            background: #fce4ec;
            color: #c62828;
        }

        .badge-COMPLETED {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .badge-NO_SHOW {
            background: #fff3e0;
            color: #e65100;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container-fluid p-0">
        <div class="row g-0">

            <!-- Sidebar -->
            <div class="col-auto sidebar px-3 py-4" style="width:230px;">
                <div class="brand mb-4 px-2"><i class="bi bi-heart-pulse-fill me-2 text-danger"></i>Ippo Clinic</div>
                <ul class="nav flex-column gap-1">
                    <li><a th:href="@{/dashboard}" class="nav-link px-3 py-2"><i
                                class="bi bi-grid-fill me-2"></i>Dashboard</a></li>
                    <li><a th:href="@{/appointments}" class="nav-link px-3 py-2"><i
                                class="bi bi-calendar2-check me-2"></i>Appointments</a></li>
                    <li><a th:href="@{/schedule}" class="nav-link active px-3 py-2"><i
                                class="bi bi-calendar3 me-2"></i>Schedule</a></li>
                </ul>
                <div class="mt-auto pt-4">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-light w-100">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </button>
                    </form>
                </div>
            </div>

            <!-- Main content -->
            <div class="col p-4">
                <div class="mb-4">
                    <h4 class="fw-bold mb-0">Doctor Schedules</h4>
                    <p class="text-muted small">Upcoming appointments per doctor</p>
                </div>

                <div th:if="${#lists.isEmpty(doctors)}" class="text-center text-muted py-5">
                    <i class="bi bi-person-x fs-2 d-block mb-2"></i>No doctors registered yet.
                </div>

                <div class="row g-4">
                    <div class="col-lg-6" th:each="doc : ${doctors}">
                        <div class="card border-0 shadow-sm doctor-card">
                            <div class="card-header bg-white border-0 py-3 d-flex align-items-center gap-3">
                                <div class="rounded-circle bg-primary bg-opacity-10 p-2">
                                    <i class="bi bi-person-badge text-primary fs-5"></i>
                                </div>
                                <div>
                                    <div class="fw-bold" th:text="'Dr. ' + ${doc.firstName} + ' ' + ${doc.lastName}">Dr.
                                        Name</div>
                                    <div class="text-muted small" th:text="${doc.specialization}">Specialization</div>
                                </div>
                                <span class="ms-auto badge bg-primary rounded-pill" th:text="${doc.email}">email</span>
                            </div>
                            <div class="card-body p-0">
                                <!-- Fetch schedule via JS/API or show placeholder message -->
                                <div class="px-4 py-3 text-muted small">
                                    <i class="bi bi-info-circle me-1"></i>
                                    Use <code>GET /api/doctors/<span th:text="${doc.id}">1</span>/schedule</code>
                                    to fetch this doctor's full schedule via the REST API.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
