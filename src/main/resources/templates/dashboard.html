<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard — Ippo Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        .sidebar {
            min-height: 100vh;
            background: #1a2035;
        }

        .sidebar .nav-link {
            color: #adb5bd;
            border-radius: 8px;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: #2d3a5e;
            color: #fff;
        }

        .sidebar .brand {
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .stat-card {
            border: none;
            border-radius: 12px;
        }

        .badge-SCHEDULED {
            background: #e3f0ff;
            color: #1565c0;
        }

        .badge-CONFIRMED {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-CANCELLED {
            background: #fce4ec;
            color: #c62828;
        }

        .badge-COMPLETED {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .badge-NO_SHOW {
            background: #fff3e0;
            color: #e65100;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container-fluid p-0">
        <div class="row g-0">

            <!-- Sidebar -->
            <div class="col-auto sidebar px-3 py-4" style="width:230px;">
                <div class="brand mb-4 px-2"><i class="bi bi-heart-pulse-fill me-2 text-danger"></i>Ippo Clinic</div>
                <ul class="nav flex-column gap-1">
                    <li class="nav-item">
                        <a th:href="@{/dashboard}" class="nav-link active px-3 py-2">
                            <i class="bi bi-grid-fill me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/appointments}" class="nav-link px-3 py-2">
                            <i class="bi bi-calendar2-check me-2"></i>Appointments
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/schedule}" class="nav-link px-3 py-2">
                            <i class="bi bi-calendar3 me-2"></i>Schedule
                        </a>
                    </li>
                </ul>
                <div class="mt-auto pt-4">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-light w-100">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </button>
                    </form>
                </div>
            </div>

            <!-- Main content -->
            <div class="col p-4">
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="mb-0 fw-bold">Dashboard</h4>
                        <p class="text-muted small mb-0">Welcome back, <span th:text="${currentUser}">user</span></p>
                    </div>
                    <span sec:authentication="principal.authorities" class="badge bg-primary fs-6 text-capitalize"
                        th:text="${#authentication.principal.authorities[0].authority.replace('ROLE_','')}">ROLE</span>
                </div>

                <!-- Stat cards -->
                <div class="row g-3 mb-4">
                    <div class="col-sm-6 col-xl-3">
                        <div class="card stat-card shadow-sm h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                                    <i class="bi bi-calendar2-check text-primary fs-4"></i>
                                </div>
                                <div>
                                    <div class="fs-2 fw-bold" th:text="${totalAppointments}">0</div>
                                    <div class="text-muted small">Total Appointments</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="card stat-card shadow-sm h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-circle bg-success bg-opacity-10 p-3">
                                    <i class="bi bi-person-badge text-success fs-4"></i>
                                </div>
                                <div>
                                    <div class="fs-2 fw-bold" th:text="${#lists.size(doctors)}">0</div>
                                    <div class="text-muted small">Doctors</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="card stat-card shadow-sm h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-circle bg-info bg-opacity-10 p-3">
                                    <i class="bi bi-people text-info fs-4"></i>
                                </div>
                                <div>
                                    <div class="fs-2 fw-bold" th:text="${#lists.size(patients)}">0</div>
                                    <div class="text-muted small">Patients</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-xl-3">
                        <div class="card stat-card shadow-sm h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="rounded-circle bg-warning bg-opacity-10 p-3">
                                    <i class="bi bi-clock-history text-warning fs-4"></i>
                                </div>
                                <div>
                                    <div class="fs-2 fw-bold"
                                        th:text="${#lists.size(appointments.?[status.name() == 'SCHEDULED'])}">0</div>
                                    <div class="text-muted small">Scheduled</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent appointments -->
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                        <span class="fw-semibold">Recent Appointments</span>
                        <a th:href="@{/appointments}" class="btn btn-sm btn-outline-primary">View all</a>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">#</th>
                                        <th>Doctor</th>
                                        <th>Patient</th>
                                        <th>Date &amp; Time</th>
                                        <th>Duration</th>
                                        <th>Status</th>
                                        <th>Notes</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="apt : ${appointments}">
                                        <td class="ps-4 text-muted small" th:text="${apt.id}">1</td>
                                        <td>
                                            <div class="fw-semibold small"
                                                th:text="${apt.doctor.firstName + ' ' + apt.doctor.lastName}">Dr. Name
                                            </div>
                                            <div class="text-muted" style="font-size:0.75rem;"
                                                th:text="${apt.doctor.specialization}">Spec</div>
                                        </td>
                                        <td class="small"
                                            th:text="${apt.patient.firstName + ' ' + apt.patient.lastName}">Patient</td>
                                        <td class="small"
                                            th:text="${#temporals.format(apt.scheduledAt, 'MMM d, yyyy HH:mm')}">Date
                                        </td>
                                        <td class="small" th:text="${apt.durationMinutes + ' min'}">30 min</td>
                                        <td>
                                            <span class="badge rounded-pill px-2 py-1 small"
                                                th:classappend="'badge-' + ${apt.status.name()}"
                                                th:text="${apt.status}">STATUS</span>
                                        </td>
                                        <td class="small text-muted" th:text="${apt.notes ?: '—'}">Notes</td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(appointments)}">
                                        <td colspan="7" class="text-center text-muted py-4">No appointments found.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div><!-- /main -->
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
