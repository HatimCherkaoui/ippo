<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Appointments — Ippo Clinic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        .sidebar {
            min-height: 100vh;
            background: #1a2035;
        }

        .sidebar .nav-link {
            color: #adb5bd;
            border-radius: 8px;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: #2d3a5e;
            color: #fff;
        }

        .sidebar .brand {
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .badge-SCHEDULED {
            background: #e3f0ff;
            color: #1565c0;
        }

        .badge-CONFIRMED {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-CANCELLED {
            background: #fce4ec;
            color: #c62828;
        }

        .badge-COMPLETED {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .badge-NO_SHOW {
            background: #fff3e0;
            color: #e65100;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container-fluid p-0">
        <div class="row g-0">

            <!-- Sidebar -->
            <div class="col-auto sidebar px-3 py-4" style="width:230px;">
                <div class="brand mb-4 px-2"><i class="bi bi-heart-pulse-fill me-2 text-danger"></i>Ippo Clinic</div>
                <ul class="nav flex-column gap-1">
                    <li><a th:href="@{/dashboard}" class="nav-link px-3 py-2"><i
                                class="bi bi-grid-fill me-2"></i>Dashboard</a></li>
                    <li><a th:href="@{/appointments}" class="nav-link active px-3 py-2"><i
                                class="bi bi-calendar2-check me-2"></i>Appointments</a></li>
                    <li><a th:href="@{/schedule}" class="nav-link px-3 py-2"><i
                                class="bi bi-calendar3 me-2"></i>Schedule</a></li>
                </ul>
                <div class="mt-auto pt-4">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-light w-100">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </button>
                    </form>
                </div>
            </div>

            <!-- Main content -->
            <div class="col p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="mb-0 fw-bold">Appointments</h4>
                        <p class="text-muted small mb-0" th:text="${#lists.size(appointments) + ' total records'}">0
                            total records</p>
                    </div>
                </div>

                <!-- Filter pills -->
                <div class="d-flex gap-2 mb-3 flex-wrap">
                    <span class="badge rounded-pill bg-secondary px-3 py-2">All</span>
                    <span class="badge rounded-pill px-3 py-2 badge-SCHEDULED">Scheduled</span>
                    <span class="badge rounded-pill px-3 py-2 badge-CONFIRMED">Confirmed</span>
                    <span class="badge rounded-pill px-3 py-2 badge-COMPLETED">Completed</span>
                    <span class="badge rounded-pill px-3 py-2 badge-CANCELLED">Cancelled</span>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">#</th>
                                        <th>Doctor</th>
                                        <th>Specialization</th>
                                        <th>Patient</th>
                                        <th>Scheduled At</th>
                                        <th>Duration</th>
                                        <th>Status</th>
                                        <th>Notes</th>
                                        <th>Created</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="apt : ${appointments}">
                                        <td class="ps-4 text-muted small fw-semibold" th:text="${apt.id}">1</td>
                                        <td>
                                            <span class="fw-semibold small"
                                                th:text="'Dr. ' + ${apt.doctor.firstName} + ' ' + ${apt.doctor.lastName}">Dr.</span>
                                        </td>
                                        <td class="small text-muted" th:text="${apt.doctor.specialization}">Cardiology
                                        </td>
                                        <td class="small"
                                            th:text="${apt.patient.firstName + ' ' + apt.patient.lastName}">Patient</td>
                                        <td class="small"
                                            th:text="${#temporals.format(apt.scheduledAt, 'MMM d, yyyy HH:mm')}">Date
                                        </td>
                                        <td class="small" th:text="${apt.durationMinutes + ' min'}">30 min</td>
                                        <td>
                                            <span class="badge rounded-pill px-2 py-1 small"
                                                th:classappend="'badge-' + ${apt.status.name()}"
                                                th:text="${apt.status}">STATUS</span>
                                        </td>
                                        <td class="small text-muted" th:text="${apt.notes ?: '—'}">Notes</td>
                                        <td class="small text-muted"
                                            th:text="${apt.createdAt != null ? #temporals.format(apt.createdAt, 'MMM d') : '—'}">
                                            Date</td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(appointments)}">
                                        <td colspan="9" class="text-center text-muted py-5">
                                            <i class="bi bi-calendar-x fs-2 d-block mb-2"></i>No appointments found.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
