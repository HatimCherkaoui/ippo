spring.application.name=ippo

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/ippo_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT  (base64-encoded 256-bit secret)
app.jwt.secret=dGhpcy1pcy1hLXZlcnktbG9uZy1hbmQtc2VjdXJlLXNlY3JldC1rZXktZm9yLWp3dA==
app.jwt.expiration=86400000

# Thymeleaf
spring.thymeleaf.cache=false
